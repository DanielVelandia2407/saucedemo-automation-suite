name: Automation Tests - SauceDemo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Lunes a viernes a las 7:00am UTC
    - cron: '0 7 * * 1-5'

jobs:
  test:
    name: Run ${{ github.event_name == 'schedule' && 'Regression' || 'Smoke' }} Tests
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Instalar Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Determinar tags a ejecutar
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "tags=@regression" >> "$GITHUB_OUTPUT"
            echo "label=Regresión (schedule)" >> "$GITHUB_OUTPUT"
          else
            echo "tags=@smoke" >> "$GITHUB_OUTPUT"
            echo "label=Smoke (${{ github.event_name }})" >> "$GITHUB_OUTPUT"
          fi

      - name: Ejecutar tests con Maven
        run: mvn verify -Dcucumber.filter.tags="${{ steps.tags.outputs.tags }}" --no-transfer-progress
        env:
          JAVA_TOOL_OPTIONS: -Djava.awt.headless=true

      - name: Subir reporte HTML como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report-${{ github.run_number }}-${{ github.sha }}
          path: target/cucumber-reports/
          retention-days: 30

      - name: Publicar resumen en el PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const jsonPath = 'target/cucumber-reports/cucumber.json';

            if (!fs.existsSync(jsonPath)) {
              console.log('No se encontró cucumber.json, omitiendo comentario en PR');
              return;
            }

            const results = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
            let passed = 0, failed = 0, skipped = 0;

            results.forEach(feature => {
              (feature.elements || []).forEach(scenario => {
                const steps = scenario.steps || [];
                const hasFailed = steps.some(s => s.result && s.result.status === 'failed');
                const hasSkipped = steps.some(s => s.result && s.result.status === 'skipped');
                if (hasFailed) failed++;
                else if (hasSkipped) skipped++;
                else passed++;
              });
            });

            const total = passed + failed + skipped;
            const statusEmoji = failed > 0 ? '❌' : '✅';
            const passPct = total > 0 ? ((passed / total) * 100).toFixed(1) : '0.0';

            const body = [
              `## ${statusEmoji} Resultados de Tests Automatizados`,
              '',
              `**Suite ejecutada:** \`@smoke\` | **Commit:** \`${{ github.sha }}\``,
              '',
              '| Estado | Escenarios |',
              '|--------|-----------|',
              `| ✅ Pasaron | ${passed} |`,
              `| ❌ Fallaron | ${failed} |`,
              `| ⏭️ Omitidos | ${skipped} |`,
              `| **Total** | **${total}** |`,
              '',
              `**Tasa de éxito:** ${passPct}%`,
              '',
              '> Reporte HTML completo disponible en los [artifacts del workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).'
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
