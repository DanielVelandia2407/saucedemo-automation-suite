# Configuración de Serenity BDD (formato HOCON)
# Leído automáticamente por CucumberWithSerenity al ejecutar con -Pserenity

serenity {
  # Nombre visible en el reporte HTML de Serenity
  project.name = "SauceDemo Automation Suite"

  # Captura screenshot después de cada paso (BEFORE_AND_AFTER_EACH_STEP | AFTER_EACH_STEP | FOR_FAILURES | DISABLED)
  take.screenshots = FOR_FAILURES

  # Serenity NO gestiona el WebDriver en este proyecto:
  # el DriverManager.java (ThreadLocal) es el responsable del ciclo de vida.
  # Serenity solo actúa como capa de reporte sobre los eventos de Cucumber.
  manage.driver = false
}
